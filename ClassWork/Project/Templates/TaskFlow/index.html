<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Smart Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">

    <!-- ===== HEADER ===== -->
    <header class="app-header">
      <h1>TaskFlow</h1>
      <p class="subtitle">Smart Task Manager</p>
    </header>

    <!-- ===== STATISTICS BAR ===== -->
    <section class="stats-bar">
      <div class="stat-card">
        <span class="stat-value" id="total-tasks">0</span>
        <span class="stat-label">Total Tasks</span>
      </div>
      <div class="stat-card stat-completed">
        <span class="stat-value" id="completed-tasks">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="stat-card stat-overdue">
        <span class="stat-value" id="overdue-tasks">0</span>
        <span class="stat-label">Overdue</span>
      </div>
    </section>

    <!-- ===== ADD TASK FORM ===== -->
    <section class="form-section">
      <h2>Add New Task</h2>
      <form id="task-form">
        <div class="form-row">
          <div class="form-group flex-2">
            <label for="task-title">Title <span class="required">*</span></label>
            <input type="text" id="task-title" placeholder="What needs to be done?" required>
          </div>
          <div class="form-group flex-1">
            <label for="task-category">Category</label>
            <select id="task-category">
              <option value="Work">Work</option>
              <option value="Personal">Personal</option>
              <option value="Study">Study</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group flex-1">
            <label for="task-description">Description</label>
            <input type="text" id="task-description" placeholder="Add details (optional)">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group flex-1">
            <label>Priority</label>
            <div class="priority-options">
              <label class="priority-option">
                <input type="radio" name="priority" value="Low" checked>
                <span class="priority-badge priority-low">Low</span>
              </label>
              <label class="priority-option">
                <input type="radio" name="priority" value="Medium">
                <span class="priority-badge priority-medium">Medium</span>
              </label>
              <label class="priority-option">
                <input type="radio" name="priority" value="High">
                <span class="priority-badge priority-high">High</span>
              </label>
            </div>
          </div>
          <div class="form-group flex-1">
            <label for="task-due-date">Due Date <span class="required">*</span></label>
            <input type="date" id="task-due-date" required>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Add Task</button>
          <span id="form-error" class="error-message"></span>
        </div>
      </form>
    </section>

    <!-- ===== FILTERS / SEARCH / SORT ===== -->
    <section class="controls-section">
      <div class="filter-tabs">
        <button class="filter-tab active" data-category="All">All</button>
        <button class="filter-tab" data-category="Work">Work</button>
        <button class="filter-tab" data-category="Personal">Personal</button>
        <button class="filter-tab" data-category="Study">Study</button>
      </div>
      <div class="controls-right">
        <input type="text" id="search-input" placeholder="Search tasks…" class="search-input">
        <select id="sort-select" class="sort-select">
          <option value="date">Sort by Date</option>
          <option value="priority">Sort by Priority</option>
          <option value="title">Sort by Title</option>
        </select>
      </div>
    </section>

    <!-- ===== TASK LIST ===== -->
    <section class="task-list-section">
      <div id="task-list" class="task-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">📋</div>
          <p>No tasks yet. Add your first task above!</p>
        </div>
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
